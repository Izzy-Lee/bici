<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>브랜드 개발 실시간 보고서</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1f1e2e;
    --muted: #6b6a78;
    --hint: #9b9aa6;
    --paper: #faf9f6;
    --surface: #ffffff;
    --accent: #3C3489;
    --accent-soft: #EEEDFE;
    --accent-mid: #534AB7;
    --line: rgba(31,30,46,0.12);
    --ok: #0F6E56;
    --ok-soft: #E1F5EE;
    --warn: #854F0B;
    --warn-soft: #FAEEDA;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--paper); color: var(--ink);
    line-height: 1.65;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 0 20px 80px; }

  /* ── 헤더 ── */
  .masthead {
    padding: 44px 0 28px;
    border-bottom: 2px solid var(--ink);
  }
  .eyebrow {
    font-size: 12px; letter-spacing: 0.14em; color: var(--accent);
    font-weight: 500; margin-bottom: 10px;
  }
  .brand-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 30px; font-weight: 600; line-height: 1.3;
  }
  .meta-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 14px; flex-wrap: wrap; gap: 8px;
  }
  .updated { font-size: 13px; color: var(--hint); }
  .refresh-btn {
    font-family: inherit; font-size: 13px; color: var(--accent);
    background: none; border: 1px solid var(--accent);
    border-radius: 99px; padding: 6px 16px; cursor: pointer;
    transition: all .15s;
  }
  .refresh-btn:hover { background: var(--accent-soft); }

  /* ── 진행 타임라인 ── */
  .timeline {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 6px; margin: 28px 0 40px;
  }
  .phase {
    padding: 12px 8px 10px;
    border-top: 3px solid var(--line);
    font-size: 12px; color: var(--hint);
  }
  .phase .num { font-size: 11px; letter-spacing: 0.1em; display: block; margin-bottom: 2px; }
  .phase .nm { font-size: 13px; font-weight: 500; color: var(--muted); }
  .phase.done { border-top-color: var(--accent-mid); }
  .phase.done .nm { color: var(--accent); }
  .phase.now { border-top-color: var(--accent); }
  .phase.now .nm { color: var(--accent); font-weight: 700; }
  .phase.now .num::after { content: ' — 진행 중'; color: var(--accent-mid); }

  /* ── 섹션 ── */
  .sec { margin-bottom: 44px; }
  .sec-head {
    display: flex; align-items: baseline; gap: 10px;
    margin-bottom: 16px;
  }
  .sec-title { font-size: 17px; font-weight: 700; }
  .sec-note { font-size: 12px; color: var(--hint); }

  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 20px 22px;
  }

  /* ── 설문 요약 그리드 ── */
  .fact-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px;
  }
  .fact {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 10px; padding: 12px 14px;
  }
  .fact .k { font-size: 12px; color: var(--hint); margin-bottom: 2px; }
  .fact .v { font-size: 14px; font-weight: 500; }

  /* ── 방향서 ── */
  .direction-body { font-size: 15px; white-space: pre-wrap; }
  .direction-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
  .dtag {
    font-size: 13px; background: var(--accent-soft); color: var(--accent);
    padding: 5px 14px; border-radius: 99px;
  }

  /* ── 변리사 의견 ── */
  .op-item {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 16px 18px; margin-bottom: 10px;
  }
  .op-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .op-cat {
    font-size: 12px; font-weight: 500;
    background: var(--warn-soft); color: var(--warn);
    padding: 3px 10px; border-radius: 6px;
  }
  .op-status { font-size: 12px; padding: 3px 10px; border-radius: 6px; }
  .op-status.applied { background: var(--ok-soft); color: var(--ok); }
  .op-status.pending { background: #f0efeb; color: var(--muted); }
  .op-meta { font-size: 12px; color: var(--hint); margin-left: auto; }
  .op-body { font-size: 14px; color: var(--ink); }

  /* ── 시안 ── */
  .draft-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; }
  .draft {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius); overflow: hidden;
  }
  .draft img { width: 100%; display: block; aspect-ratio: 4/3; object-fit: cover; background: #f0efeb; }
  .draft-info { padding: 12px 14px; }
  .draft-name { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .draft-status {
    font-size: 11px; padding: 2px 8px; border-radius: 6px;
    background: #f0efeb; color: var(--muted); font-weight: 400;
  }
  .draft-status.fixed { background: var(--ok-soft); color: var(--ok); }
  .draft-desc { font-size: 13px; color: var(--muted); margin-top: 4px; }

  /* ── 상태 ── */
  .empty {
    border: 1.5px dashed var(--line); border-radius: var(--radius);
    padding: 28px 20px; text-align: center;
    font-size: 14px; color: var(--hint);
  }
  .loading { text-align: center; padding: 100px 20px; color: var(--hint); font-size: 14px; }
  .err {
    max-width: 480px; margin: 100px auto; text-align: center;
    padding: 32px; background: var(--surface);
    border: 1px solid var(--line); border-radius: var(--radius);
  }
  .err h2 { font-size: 18px; margin-bottom: 8px; }
  .err p { font-size: 14px; color: var(--muted); }

  .footer {
    border-top: 1px solid var(--line); padding-top: 24px;
    font-size: 13px; color: var(--muted); line-height: 1.8;
  }
  .footer strong { color: var(--ink); }
</style>
</head>
<body>

<div class="loading" id="loading">보고서를 불러오는 중입니다…</div>

<div class="wrap" id="app" style="display:none">

  <div class="masthead">
    <div class="eyebrow">BRAND IDENTITY REPORT · 플러스프레스</div>
    <div class="brand-title" id="brandName">—</div>
    <div class="meta-row">
      <span class="updated" id="updatedAt"></span>
      <button class="refresh-btn" onclick="load(true)">새로고침 ↻</button>
    </div>
  </div>

  <div class="timeline" id="timeline">
    <div class="phase" data-p="1"><span class="num">PHASE 1</span><span class="nm">수요조사</span></div>
    <div class="phase" data-p="2"><span class="num">PHASE 2</span><span class="nm">방향서</span></div>
    <div class="phase" data-p="3"><span class="num">PHASE 3</span><span class="nm">검토·시안</span></div>
    <div class="phase" data-p="4"><span class="num">PHASE 4</span><span class="nm">납품·출원</span></div>
  </div>

  <div class="sec">
    <div class="sec-head">
      <span class="sec-title">수요조사 요약</span>
      <span class="sec-note">응답해 주신 내용입니다</span>
    </div>
    <div class="fact-grid" id="surveyGrid"></div>
  </div>

  <div class="sec">
    <div class="sec-head">
      <span class="sec-title">디자인 방향서</span>
      <span class="sec-note">담당 디자이너 작성</span>
    </div>
    <div id="directionBox"></div>
  </div>

  <div class="sec">
    <div class="sec-head">
      <span class="sec-title">변리사 검토 의견</span>
      <span class="sec-note">상표등록 관점 검토 · 실시간 반영</span>
    </div>
    <div id="opinionBox"></div>
  </div>

  <div class="sec">
    <div class="sec-head">
      <span class="sec-title">시안</span>
      <span class="sec-note">확정 시안은 배지로 표시됩니다</span>
    </div>
    <div id="draftBox"></div>
  </div>

  <div class="footer">
    <strong>문의</strong> — 이 보고서는 실시간으로 갱신됩니다.
    내용에 대한 의견은 이메일 회신 또는 전화로 알려주세요.<br>
    ㈜플러스프레스 · 아트에이블 디자인랩
  </div>

</div>

<script>
const API = 'YOUR_APPS_SCRIPT_URL_HERE';

const qs = new URLSearchParams(location.search);
const CODE = qs.get('c');
const KEY = qs.get('k');

function esc(s){
  return String(s ?? '').replace(/[&<>"']/g, m => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[m]));
}

async function load(manual){
  if(!CODE || !KEY){ showErr('잘못된 접근입니다', '전달받으신 전용 링크로 접속해 주세요.'); return; }
  if(API === 'YOUR_APPS_SCRIPT_URL_HERE'){ render(DEMO); return; }
  try {
    const r = await fetch(`${API}?c=${encodeURIComponent(CODE)}&k=${encodeURIComponent(KEY)}`);
    const d = await r.json();
    if(d.error){ showErr('접근 권한이 없습니다', d.error); return; }
    render(d);
  } catch(e){
    if(manual) alert('불러오기에 실패했어요. 잠시 후 다시 시도해 주세요.');
  }
}

function showErr(t, m){
  document.getElementById('loading').style.display = 'none';
  document.body.insertAdjacentHTML('beforeend',
    `<div class="err"><h2>${esc(t)}</h2><p>${esc(m)}</p></div>`);
}

function render(d){
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  document.getElementById('brandName').textContent = d.company.name;
  document.getElementById('updatedAt').textContent =
    '마지막 업데이트: ' + new Date().toLocaleString('ko-KR');

  const st = Number(d.company.status) || 1;
  document.querySelectorAll('.phase').forEach(p => {
    const n = Number(p.dataset.p);
    p.classList.remove('done','now');
    if(n < st) p.classList.add('done');
    if(n === st) p.classList.add('now');
  });

  const sg = document.getElementById('surveyGrid');
  if(d.survey && Object.keys(d.survey).length){
    const order = [
      ['출원형태','출원 형태'],['로고유형','로고 유형'],['모티프','심볼 모티프'],
      ['스타일','스타일'],['느낌문장','전하고 싶은 느낌'],['컬러','컬러 방향'],
      ['서체','서체 느낌'],['활용처','활용처'],['중점사항','중점 사항'],
      ['경쟁사URL','경쟁사'],['레퍼런스URL','레퍼런스 링크']
    ];
    sg.innerHTML = order
      .filter(([k]) => d.survey[k])
      .map(([k,label]) =>
        `<div class="fact"><div class="k">${esc(label)}</div><div class="v">${esc(d.survey[k])}</div></div>`
      ).join('') || '<div class="empty">설문 응답 대기 중입니다</div>';

    if (d.survey['레퍼런스이미지']) {
      const imgs = String(d.survey['레퍼런스이미지']).split(',').map(s=>s.trim()).filter(Boolean);
      if (imgs.length) {
        sg.insertAdjacentHTML('afterend',
          `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-top:10px;">
            ${imgs.map(u => `<a href="${esc(u)}" target="_blank"><img src="${esc(u)}" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:10px;border:1px solid var(--line);"></a>`).join('')}
          </div>`);
      }
    }
  } else {
    sg.innerHTML = '<div class="empty">설문 응답 대기 중입니다 — 발송된 설문 링크로 참여해 주세요</div>';
  }

  const dir = document.getElementById('directionBox');
  if(d.company.direction){
    const tags = [d.company.colorDir, d.company.fontDir, d.company.moodDir]
      .filter(Boolean)
      .map(t => `<span class="dtag">${esc(t)}</span>`).join('');
    dir.innerHTML = `<div class="card">
      <div class="direction-body">${esc(d.company.direction)}</div>
      ${tags ? `<div class="direction-tags">${tags}</div>` : ''}
    </div>`;
  } else {
    dir.innerHTML = '<div class="empty">설문 분석 후 방향서를 작성해 드립니다 (영업일 2~3일)</div>';
  }

  const op = document.getElementById('opinionBox');
  if(d.attorney && d.attorney.length){
    op.innerHTML = d.attorney.map(o => `
      <div class="op-item">
        <div class="op-top">
          <span class="op-cat">${esc(o.category)}</span>
          <span class="op-status ${o.applied === '반영완료' ? 'applied' : 'pending'}">
            ${o.applied === '반영완료' ? '✓ 디자인 반영완료' : '검토 중'}
          </span>
          <span class="op-meta">${esc(o.author)} · ${esc(o.time)}</span>
        </div>
        <div class="op-body">${esc(o.opinion)}</div>
      </div>`).join('');
  } else {
    op.innerHTML = '<div class="empty">변리사 검토 의견이 등록되면 이곳에 표시됩니다</div>';
  }

  const dr = document.getElementById('draftBox');
  if(d.drafts && d.drafts.length){
    dr.innerHTML = '<div class="draft-grid">' + d.drafts.map(x => `
      <div class="draft">
        ${x.url ? `<img src="${esc(x.url)}" alt="${esc(x.name)} 시안">` : ''}
        <div class="draft-info">
          <div class="draft-name">${esc(x.name)}
            <span class="draft-status ${x.status === '확정' ? 'fixed':''}">${esc(x.status || '검토중')}</span>
          </div>
          ${x.desc ? `<div class="draft-desc">${esc(x.desc)}</div>` : ''}
        </div>
      </div>`).join('') + '</div>';
  } else {
    dr.innerHTML = '<div class="empty">방향서 확정 후 시안이 업로드됩니다</div>';
  }
}

const DEMO = {
  company: {
    name: '데모 브랜드', status: 3,
    direction: '수요조사 결과, 귀사 브랜드는 "친근하면서도 신뢰감 있는" 방향이 적합합니다.\n심볼+로고타입 조합형으로 진행하며, 도형상표 출원을 전제로 단순화된 형태를 유지합니다.',
    colorDir: '어스톤 · 딥그린', fontDir: '산세리프 라운드', moodDir: '모던 65% · 친근 60%'
  },
  survey: {
    출원형태: '복합상표', 로고유형: '심볼 + 로고타입', 모티프: '붓, 물결, 산',
    스타일: '오가닉', 느낌문장: '"믿고 맡길 수 있겠다"', 컬러: '어스톤, 파스텔',
    서체: '산세리프', 활용처: '명함, 간판, 패키지'
  },
  attorney: [
    { time: '7/2 14:20', author: '김OO 변리사', category: '유사상표 검토',
      opinion: '유사군 코드 내 선등록 상표 2건과 칭호 유사 가능성이 있습니다. 영문 표기를 병기하는 방향을 권합니다.', applied: '반영완료' },
    { time: '7/3 10:05', author: '김OO 변리사', category: '식별력',
      opinion: '심볼 단독 출원 시 식별력 확보를 위해 도형의 독창적 요소를 강화해 주세요.', applied: '' }
  ],
  drafts: [
    { name: 'A안', url: '', desc: '심볼 강조형 — 변리사 의견 반영', status: '검토중' },
    { name: 'B안', url: '', desc: '워드마크 중심형', status: '검토중' }
  ]
};

load();
setInterval(() => load(false), 60000);
</script>
</body>
</html>
