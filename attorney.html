<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>변리사 검토 의견 제출</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1f1e2e; --muted: #6b6a78; --hint: #9b9aa6;
    --paper: #faf9f6; --surface: #fff;
    --accent: #3C3489; --accent-soft: #EEEDFE;
    --line: rgba(31,30,46,0.14);
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--paper); color: var(--ink);
    max-width: 560px; margin: 0 auto; padding: 40px 20px 80px;
    line-height: 1.6;
  }
  .eyebrow { font-size: 12px; letter-spacing: 0.14em; color: var(--accent); font-weight: 500; margin-bottom: 8px; }
  h1 { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
  .sub { font-size: 14px; color: var(--muted); margin-bottom: 32px; }
  .field { margin-bottom: 22px; }
  label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 8px; }
  .req { color: #E24B4A; font-size: 11px; margin-left: 4px; }
  input, select, textarea {
    width: 100%; padding: 13px 15px;
    border: 1.5px solid var(--line); border-radius: 10px;
    font-size: 15px; font-family: inherit; color: var(--ink);
    background: var(--surface); outline: none; transition: border-color .2s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  textarea { height: 140px; resize: vertical; }
  .cat-group { display: flex; flex-wrap: wrap; gap: 8px; }
  .cat {
    padding: 8px 16px; border-radius: 99px;
    border: 1.5px solid var(--line); background: var(--surface);
    font-size: 14px; cursor: pointer; transition: all .15s; user-select: none;
  }
  .cat.on { background: var(--accent); color: #fff; border-color: var(--accent); }
  button.submit {
    width: 100%; padding: 16px; margin-top: 8px;
    background: var(--accent); color: #fff;
    border: none; border-radius: var(--radius);
    font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer;
    transition: transform .1s;
  }
  button.submit:disabled { background: var(--hint); cursor: not-allowed; }
  button.submit:not(:disabled):active { transform: scale(0.98); }
  .done {
    display: none; text-align: center; padding: 80px 0;
  }
  .done .circle {
    width: 72px; height: 72px; border-radius: 50%;
    background: var(--accent); color: #fff; font-size: 32px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
  }
  .done h2 { font-size: 20px; margin-bottom: 6px; }
  .done p { font-size: 14px; color: var(--muted); }
  .info {
    background: var(--accent-soft); border-radius: 10px;
    padding: 12px 16px; font-size: 13px; color: var(--accent);
    margin-bottom: 28px; line-height: 1.7;
  }
</style>
</head>
<body>

<div id="form">
  <div class="eyebrow">PLUSPRESS · BRAND IDENTITY</div>
  <h1>변리사 검토 의견 제출</h1>
  <p class="sub">제출하신 의견은 고객 보고서에 실시간 반영됩니다</p>

  <div class="info">
    의견 등록 즉시 디자이너에게 알림이 발송되며,
    디자인 반영 시 보고서에 '반영완료'로 표시됩니다.
  </div>

  <div class="field">
    <label>업체 코드 <span class="req">필수</span></label>
    <input type="text" id="code" placeholder="예) A01" maxlength="10">
  </div>

  <div class="field">
    <label>작성자 <span class="req">필수</span></label>
    <input type="text" id="author" placeholder="예) 김OO 변리사">
  </div>

  <div class="field">
    <label>검토 구분 <span class="req">필수</span></label>
    <div class="cat-group" id="catGroup">
      <div class="cat" onclick="pick(this)">유사상표 검토</div>
      <div class="cat" onclick="pick(this)">식별력</div>
      <div class="cat" onclick="pick(this)">지정상품 분류</div>
      <div class="cat" onclick="pick(this)">도형 요건</div>
      <div class="cat" onclick="pick(this)">기타</div>
    </div>
  </div>

  <div class="field">
    <label>검토 의견 <span class="req">필수</span></label>
    <textarea id="opinion" placeholder="상표등록 관점의 검토 의견을 입력해 주세요"></textarea>
  </div>

  <button class="submit" id="btn" onclick="send()" disabled>의견 제출하기</button>
</div>

<div class="done" id="done">
  <div class="circle">✓</div>
  <h2>의견이 등록됐습니다</h2>
  <p>고객 보고서에 곧 반영됩니다.<br>검토 감사합니다.</p>
</div>

<script>
const API = 'YOUR_APPS_SCRIPT_URL_HERE';
let category = '';

const qs = new URLSearchParams(location.search);
if(qs.get('c')) document.getElementById('code').value = qs.get('c');

function pick(el){
  document.querySelectorAll('.cat').forEach(c => c.classList.remove('on'));
  el.classList.add('on');
  category = el.textContent;
  validate();
}

['code','author','opinion'].forEach(id =>
  document.getElementById(id).addEventListener('input', validate));

function validate(){
  const ok = document.getElementById('code').value.trim()
    && document.getElementById('author').value.trim()
    && category
    && document.getElementById('opinion').value.trim().length >= 5;
  document.getElementById('btn').disabled = !ok;
}

function send(){
  const btn = document.getElementById('btn');
  btn.disabled = true; btn.textContent = '제출 중…';

  const payload = {
    type: 'attorney',
    code: document.getElementById('code').value.trim().toUpperCase(),
    author: document.getElementById('author').value.trim(),
    category: category,
    opinion: document.getElementById('opinion').value.trim(),
    timestamp: new Date().toLocaleString('ko-KR')
  };

  if(API === 'YOUR_APPS_SCRIPT_URL_HERE'){
    console.log('[DEV]', payload);
    finish(); return;
  }

  fetch(API, {
    method: 'POST', mode: 'no-cors',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(payload)
  }).then(finish).catch(() => {
    alert('제출에 실패했어요. 다시 시도해 주세요.');
    btn.disabled = false; btn.textContent = '의견 제출하기';
  });
}

function finish(){
  document.getElementById('form').style.display = 'none';
  document.getElementById('done').style.display = 'block';
  window.scrollTo(0,0);
}
</script>
</body>
</html>
